# ── QR code storage ───────────────────────────────────────────────────────────
# Relative to where the Spring Boot process runs (project root)
app.qr.storage-path=uploads/qr

# ── Application URLs ─────────────────────────────────────────────────────────
app.frontend-url=http://localhost:5173
app.base-url=http://localhost:9090

# ── Static resources (serve QR images) ───────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.mvc.static-path-pattern=/qr/**

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.museum.ticketbooking=INFO
logging.level.org.springframework.mail=WARN

# CORS
cors.allowed-origins=http://localhost:5173
